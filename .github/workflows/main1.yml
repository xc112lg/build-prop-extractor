name: CIw

on:
  push:

  workflow_dispatch:
    inputs:
      zip_url:
        description: "Direct URL to the ROM ZIP file"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip p7zip-full brotli python3 curl
          wget https://raw.githubusercontent.com/akhilnarang/scripts/master/setup/android_build_env.sh
          sudo bash android_build_env.sh

      - name: Extract build.prop
        run: |
          mkdir -p dumper
          cd dumper
      
          wget -O rom.zip "${{ inputs.zip_url }}"
      
          mkdir -p dump
          unzip -o rom.zip -d dump
      
          cd dump
      
          brotli --decompress system.new.dat.br
      
          curl -sLo sdat2img.py \
            https://raw.githubusercontent.com/xpirt/sdat2img/master/sdat2img.py
      
          python3 sdat2img.py \
            system.transfer.list \
            system.new.dat \
            system.img
      
          # Try common Android locations
          debugfs -R "dump /system/build.prop build.prop" system.img 2>/dev/null || \
          debugfs -R "dump /build.prop build.prop" system.img 2>/dev/null || \
          debugfs -R "dump /system/system/build.prop build.prop" system.img 2>/dev/null
      
          if [ ! -f build.prop ]; then
            echo "build.prop not found in image"
            echo "Listing image contents..."
      
            debugfs -R "ls -p /" system.img || true
            debugfs -R "ls -p /system" system.img || true
      
            exit 1
          fi
      
          echo "===== build.prop ====="
          cat build.prop
      
          echo "===== Upload URL ====="
          curl --upload-file build.prop https://transfer.sh/build.prop
